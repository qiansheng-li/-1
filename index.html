<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>药理学期末练习题 · 智能刷题</title>
    <style>
        /* ===== 全局重置 & 深色主题 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
            background: #11131f;
            /* 最深底色 */
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .app-container {
            max-width: 860px;
            width: 100%;
            background: #1f2232;
            /* 主卡片深灰 */
            border-radius: 32px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.7);
            padding: 28px 32px 32px;
            transition: all 0.2s ease;
            border: 1px solid #2e3145;
        }

        /* ===== Header ===== */
        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 18px;
            padding-bottom: 14px;
            border-bottom: 2px solid #2e3145;
        }

        .app-header h1 {
            font-size: 22px;
            font-weight: 700;
            color: #e8edf5;
            letter-spacing: -0.3px;
        }

        .app-header .stats {
            font-size: 14px;
            color: #a8b5d0;
            background: #2a2d42;
            padding: 6px 16px;
            border-radius: 40px;
            font-weight: 500;
        }

        /* ===== Progress ===== */
        .progress-bar {
            width: 100%;
            height: 5px;
            background: #2a2d42;
            border-radius: 10px;
            margin-bottom: 22px;
            overflow: hidden;
        }

        .progress-bar .fill {
            height: 100%;
            background: linear-gradient(90deg, #6c8cff, #a78bfa);
            border-radius: 10px;
            transition: width 0.3s ease;
            width: 0%;
        }

        /* ===== Chapter tag ===== */
        .chapter-tag {
            display: inline-block;
            background: #2a2d42;
            color: #a8c0ff;
            font-size: 12px;
            font-weight: 600;
            padding: 4px 14px;
            border-radius: 30px;
            letter-spacing: 0.3px;
            margin-bottom: 16px;
            border: 1px solid #3a3d55;
        }

        /* ===== Question ===== */
        .question-number {
            font-size: 14px;
            font-weight: 600;
            color: #6c8cff;
            margin-bottom: 8px;
        }

        .question-text {
            font-size: 19px;
            font-weight: 500;
            line-height: 1.6;
            color: #e8edf5;
            margin-bottom: 22px;
            padding-right: 4px;
        }

        /* ===== Options ===== */
        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 28px;
        }

        .option-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 20px;
            background: #262a3e;
            border: 2px solid #32364e;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.18s ease;
            font-size: 16px;
            color: #d6def0;
            font-weight: 450;
        }

        .option-item:hover:not(.disabled) {
            background: #2f334b;
            border-color: #5a6090;
            transform: translateY(-1px);
        }

        .option-item .label {
            font-weight: 600;
            color: #8ea4dd;
            min-width: 26px;
        }

        .option-item .text {
            flex: 1;
        }

        /* ---- states (深色适配) ---- */
        .option-item.correct {
            background: #1e3a2f;
            border-color: #34b87a;
            box-shadow: 0 0 0 2px rgba(52, 184, 122, 0.2);
        }
        .option-item.correct .label {
            color: #4cdb9a;
        }

        .option-item.wrong {
            background: #3d2228;
            border-color: #e06b6b;
            box-shadow: 0 0 0 2px rgba(224, 107, 107, 0.18);
        }
        .option-item.wrong .label {
            color: #f28b8b;
        }

        .option-item.disabled {
            cursor: default;
            opacity: 0.65;
        }
        .option-item.disabled:hover {
            transform: none;
            background: #262a3e;
            border-color: #32364e;
        }
        .option-item.correct.disabled {
            opacity: 1;
            background: #1e3a2f;
            border-color: #34b87a;
        }
        .option-item.wrong.disabled {
            opacity: 1;
            background: #3d2228;
            border-color: #e06b6b;
        }

        /* ===== Feedback ===== */
        .feedback-box {
            padding: 14px 20px;
            border-radius: 14px;
            margin-bottom: 24px;
            font-size: 15px;
            font-weight: 500;
            display: none;
            background: #262a3e;
            border-left: 5px solid #6c8cff;
            color: #d6def0;
        }
        .feedback-box.show {
            display: block;
        }
        .feedback-box.correct {
            background: #1a3329;
            border-left-color: #34b87a;
            color: #b0e6cf;
        }
        .feedback-box.wrong {
            background: #382129;
            border-left-color: #e06b6b;
            color: #f0c8c8;
        }

        /* ===== Navigation ===== */
        .nav-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            border-top: 2px solid #2e3145;
            padding-top: 20px;
            margin-top: 4px;
        }

        .nav-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 24px;
            border: none;
            border-radius: 40px;
            font-size: 15px;
            font-weight: 600;
            background: #2a2d42;
            color: #bcc8e8;
            cursor: pointer;
            transition: all 0.2s ease;
            min-width: 110px;
            justify-content: center;
            border: 1px solid #3a3d55;
        }

        .nav-btn:hover:not(:disabled) {
            background: #363a56;
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(108, 140, 255, 0.15);
            border-color: #5a6090;
        }

        .nav-btn:disabled {
            opacity: 0.35;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }

        .nav-btn.primary {
            background: #4a6cf7;
            color: #fff;
            border-color: #4a6cf7;
        }
        .nav-btn.primary:hover:not(:disabled) {
            background: #5f7dfa;
            border-color: #5f7dfa;
        }

        .nav-btn .icon {
            font-size: 18px;
            line-height: 1;
        }

        .question-counter {
            font-size: 14px;
            color: #b0bddb;
            font-weight: 500;
            background: #2a2d42;
            padding: 6px 18px;
            border-radius: 40px;
            white-space: nowrap;
            border: 1px solid #3a3d55;
        }

        /* ===== Wrong Book Toggle ===== */
        .wrong-book-toggle {
            margin-top: 16px;
            display: flex;
            justify-content: flex-end;
        }

        .wrong-book-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 18px;
            border-radius: 40px;
            border: 1px solid #3a3d55;
            background: #262a3e;
            font-size: 14px;
            font-weight: 600;
            color: #c8d4f0;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .wrong-book-btn:hover {
            background: #2f334b;
            border-color: #5a6090;
        }

        .wrong-book-btn .badge {
            background: #d9534f;
            color: #fff;
            border-radius: 30px;
            padding: 0 10px;
            font-size: 12px;
            line-height: 20px;
            font-weight: 700;
        }

        /* ===== Wrong Panel ===== */
        .wrong-panel {
            margin-top: 20px;
            border-top: 2px solid #2e3145;
            padding-top: 18px;
            display: none;
            max-height: 320px;
            overflow-y: auto;
        }

        .wrong-panel.open {
            display: block;
        }

        .wrong-panel h3 {
            font-size: 16px;
            color: #d6def0;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .wrong-panel .empty-msg {
            color: #8896b8;
            font-size: 15px;
            padding: 16px 0;
            text-align: center;
        }

        .wrong-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 16px;
            background: #262a3e;
            border-radius: 12px;
            border: 1px solid #32364e;
            margin-bottom: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: 0.15s ease;
            color: #d6def0;
        }

        .wrong-item:hover {
            background: #2f334b;
            border-color: #5a6090;
        }

        .wrong-item .q-preview {
            flex: 1;
            color: #d6def0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            padding-right: 12px;
        }

        .wrong-item .q-idx {
            font-weight: 600;
            color: #6c8cff;
            margin-right: 12px;
            font-size: 13px;
        }

        .wrong-item .remove-btn {
            background: none;
            border: none;
            color: #6a7a9a;
            font-size: 18px;
            cursor: pointer;
            padding: 0 4px;
            transition: 0.15s ease;
        }
        .wrong-item .remove-btn:hover {
            color: #e06b6b;
        }

        /* ===== Scrollbar ===== */
        .wrong-panel::-webkit-scrollbar {
            width: 5px;
        }
        .wrong-panel::-webkit-scrollbar-track {
            background: #1f2232;
            border-radius: 10px;
        }
        .wrong-panel::-webkit-scrollbar-thumb {
            background: #3a3d55;
            border-radius: 10px;
        }
        .wrong-panel::-webkit-scrollbar-thumb:hover {
            background: #5a6090;
        }

        /* ===== Responsive ===== */
        @media (max-width: 600px) {
            .app-container {
                padding: 18px 16px 22px;
                border-radius: 24px;
            }
            .question-text {
                font-size: 17px;
            }
            .option-item {
                padding: 12px 16px;
                font-size: 15px;
            }
            .nav-btn {
                padding: 8px 16px;
                font-size: 14px;
                min-width: 80px;
            }
            .app-header h1 {
                font-size: 19px;
            }
            .nav-bar {
                gap: 8px;
            }
            .question-counter {
                font-size: 13px;
                padding: 4px 14px;
            }
            .wrong-item {
                font-size: 13px;
                padding: 8px 12px;
            }
        }

        @media (max-width: 420px) {
            .app-container {
                padding: 14px 12px 18px;
            }
            .question-text {
                font-size: 16px;
            }
            .option-item {
                padding: 10px 14px;
                font-size: 14px;
                gap: 10px;
            }
            .nav-btn {
                padding: 6px 12px;
                font-size: 13px;
                min-width: 60px;
            }
            .nav-btn .icon {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>

    <div class="app-container" id="app">
        <!-- header -->
        <div class="app-header">
            <h1>📘 药理 · 智能刷题</h1>
            <span class="stats" id="progressStats">0 / 0</span>
        </div>

        <!-- progress -->
        <div class="progress-bar">
            <div class="fill" id="progressFill"></div>
        </div>

        <!-- chapter -->
        <div class="chapter-tag" id="chapterTag">药理学总论</div>

        <!-- question -->
        <div class="question-number" id="qNum">第 1 题</div>
        <div class="question-text" id="qText">加载题目中...</div>

        <!-- options -->
        <div class="options-grid" id="optionsContainer"></div>

        <!-- feedback -->
        <div class="feedback-box" id="feedbackBox"></div>

        <!-- nav -->
        <div class="nav-bar">
            <button class="nav-btn" id="prevBtn" disabled>
                <span class="icon">‹</span> 上一题
            </button>
            <span class="question-counter" id="counterDisplay">1 / 1</span>
            <button class="nav-btn primary" id="nextBtn">
                下一题 <span class="icon">›</span>
            </button>
        </div>

        <!-- wrong book toggle -->
        <div class="wrong-book-toggle">
            <button class="wrong-book-btn" id="wrongToggle">
                📕 错题本 <span class="badge" id="wrongBadge">0</span>
            </button>
        </div>

        <!-- wrong panel -->
        <div class="wrong-panel" id="wrongPanel">
            <h3>📕 错题回顾</h3>
            <div id="wrongList">
                <div class="empty-msg">✨ 还没有错题，继续加油！</div>
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        //  DATA  —  所有题目（共 198 题）
        //  格式：{ id, chapter, q, options: [...], correct: 0-based }
        // ============================================================
        const QUESTIONS = [
            // ——— 一、药理学总论 (1-33) ———
            { id: 1, chapter: '药理学总论', q: '药物是 ( )', options: ['A.一种化学物质', 'B.能干扰细胞代谢活动的化学物质', 'C.能影响机体生理功能的物质', 'D.用以防治及诊断疾病的物质'], correct: 3 },
            { id: 2, chapter: '药理学总论', q: '药理学是医学教学中的一门重要学科，是因为它 ( )', options: ['A.阐明了药物的作用机制', 'B.能改善药物质量、提高药物疗效', 'C.为开发新药提供实验资料与理论依据', 'D.为指导临床合理用药提供理论基础'], correct: 3 },
            { id: 3, chapter: '药理学总论', q: '药效学是研究 ( )', options: ['A.药物的疗效', 'B.药物在体内的变化过程', 'C.药物对机体的作用规律', 'D.影响药效的因素'], correct: 2 },
            { id: 4, chapter: '药理学总论', q: '药动学是研究 ( )', options: ['A.药物在机体影响下的变化及其规律', 'B.药物如何影响机体', 'C.药物发生的动力学变化及其规律', 'D.合理用药的治疗方案'], correct: 0 },
            { id: 5, chapter: '药理学总论', q: '药理学研究的中心内容是 ( )', options: ['A.药物的作用、用途和不良反应', 'B.药物的作用及原理', 'C.药物的化学结构、药品组分', 'D.药效学、药动学及影响药物作用的因素'], correct: 3 },
            { id: 6, chapter: '药理学总论', q: '新药进行临床试验必须提供 ( )', options: ['A.系统药理研究数据', 'B.急、慢性毒性观察结果', 'C.新药作用谱', 'D.临床前研究资料'], correct: 3 },
            { id: 7, chapter: '药理学总论', q: '大多数药物是按下列哪种机制进入体内 ( )', options: ['A.易化扩散', 'B.简单扩散', 'C.主动转运', 'D.过滤'], correct: 1 },
            { id: 8, chapter: '药理学总论', q: '主动转运的特点是 ( )', options: ['A.通过载体转运，不需耗能', 'B.通过载体转运，需要耗能', 'C.不通过载体转运，不需耗能', 'D.不通过载体转运，需要耗能'], correct: 1 },
            { id: 9, chapter: '药理学总论', q: '某碱性药物的pKa=9.8，如果增高尿液的pH，则此药在尿中 ( )', options: ['A.解离度增高，重吸收减少，排泄加快', 'B.解离度增高，重吸收增多，排泄减慢', 'C.解离度降低，重吸收减少，排泄加快', 'D.解离度降低，重吸收增多，排泄减慢'], correct: 0 },
            { id: 10, chapter: '药理学总论', q: '在酸性尿液中弱酸性药物 ( )', options: ['A.解离多，再吸收多，排泄慢', 'B.解离少，再吸收多，排泄慢', 'C.解离多，再吸收多，排泄快', 'D.解离多，再吸收少，排泄快'], correct: 1 },
            { id: 11, chapter: '药理学总论', q: '吸收是指药物进入 ( )', options: ['A.胃肠道过程', 'B.靶器官过程', 'C.血液循环过程', 'D.细胞内过程'], correct: 2 },
            { id: 12, chapter: '药理学总论', q: '药物的首关效应可能发生于 ( )', options: ['A.舌下给药后', 'B.吸入给药后', 'C.口服给药后', 'D.静脉注射后'], correct: 2 },
            { id: 13, chapter: '药理学总论', q: '药物与血浆蛋白的结合 ( )', options: ['A.是永久的', 'B.是可逆的', 'C.对药物主动转运有影响', 'D.促进药物排泄'], correct: 1 },
            { id: 14, chapter: '药理学总论', q: '促进药物生物转化的主要酶系统是 ( )', options: ['A.单胺氧化酶', 'B.细胞色素P450酶系统', 'C.辅酶Ⅱ', 'D.葡萄糖醛酸转移酶'], correct: 1 },
            { id: 15, chapter: '药理学总论', q: '下列药物中能诱导肝药酶的是 ( )', options: ['A.氯霉素', 'B.苯巴比妥', 'C.异烟肼', 'D.阿司匹林'], correct: 1 },
            { id: 16, chapter: '药理学总论', q: '药物的生物利用度是指 ( )', options: ['A.药物能通过胃肠道进入肝门脉循环的分量', 'B.药物能吸收进入体循环的分量', 'C.药物能吸收进入体内达到作用点的分量', 'D.药物吸收进入体循环的分量和速度'], correct: 3 },
            { id: 17, chapter: '药理学总论', q: '药物在体内的转化和排泄统称为 ( )', options: ['A.代谢', 'B.消除', 'C.灭活', 'D.解毒'], correct: 1 },
            { id: 18, chapter: '药理学总论', q: '决定药物每天用药次数的主要因素是 ( )', options: ['A.作用强弱', 'B.吸收快慢', 'C.体内分布速度', 'D.体内消除速度'], correct: 3 },
            { id: 19, chapter: '药理学总论', q: '下列关于受体的叙述，正确的是 ( )', options: ['A.受体是首先与药物结合并起反应的细胞成分', 'B.受体都是细胞膜上的多糖', 'C.受体是遗传基因生成的，其分布密度是固定不变的', 'D.受体与配基或激动药结合后都引起兴奋性效应'], correct: 0 },
            { id: 20, chapter: '药理学总论', q: '当某药物与受体相结合后，产生某种作用并引起一系列效应，该药是属于 ( )', options: ['A.兴奋剂', 'B.激动剂', 'C.抑制剂', 'D.拮抗剂'], correct: 1 },
            { id: 21, chapter: '药理学总论', q: '药物与特异性受体结合后，可能激动受体，也可能阻断受体，这取决于 ( )', options: ['A.药物的作用强度', 'B.药物的剂量大小', 'C.药物是否具有亲和力', 'D.药物是否具有内在活性'], correct: 3 },
            { id: 22, chapter: '药理学总论', q: '完全激动药的概念是药物 ( )', options: ['A.与受体有较强的亲和力和较强的内在活性', 'B.与受体有较强亲和力，无内在活性', 'C.与受体有较强的亲和力和较弱的内在活性', 'D.与受体有较弱的亲和力，无内在活性'], correct: 0 },
            { id: 23, chapter: '药理学总论', q: '加入竞争性拮抗药后，相应受体激动药的量效曲线将会 ( )', options: ['A.平行右移，最大效应不变', 'B.平行左移，最大效应不变', 'C.向右移动，最大效应降低', 'D.向左移动，最大效应降低'], correct: 0 },
            { id: 24, chapter: '药理学总论', q: '加入非竞争性拮抗药后，相应受体激动药的量效曲线将会 ( )', options: ['A.平行右移，最大效应不变', 'B.平行左移，最大效应不变', 'C.向右移动，最大效应降低', 'D.向左移动，最大效应降低'], correct: 2 },
            { id: 25, chapter: '药理学总论', q: '受体阻断药的特点是 ( )', options: ['A.对受体有亲和力，且有内在活性', 'B.对受体无亲和力，但有内在活性', 'C.对受体有亲和力，但无内在活性', 'D.对受体无亲和力，也无内在活性'], correct: 2 },

            { id: 191, chapter: '抗菌药物药理', q: '治疗金黄色葡萄球菌引起的急慢性骨髓炎及关节感染的首选药是 ( )', options: ['A.万古霉素', 'B.克林霉素', 'C.克拉霉素', 'D.红霉素'], correct: 1 },
            { id: 192, chapter: '抗菌药物药理', q: '服药期间饮酒(包括中药药酒)，可能导致双硫仑样反应的抗生素是 ( )', options: ['A.头孢孟多', 'B.万古霉素', 'C.红霉素', 'D.克拉霉素'], correct: 0 },

            { id: 194, chapter: '抗菌药物药理', q: '氯霉素的抗菌作用机制，正确的是 ( )', options: ['A.抑制细菌的DNA合成', 'B.抑制细菌的蛋白质合成', 'C.干扰细菌的细胞壁合成', 'D.干扰细菌的RNA转录'], correct: 1 },
            { id: 195, chapter: '抗菌药物药理', q: '抑制二氢叶酸还原酶的药物是 ( )', options: ['A.克拉霉素', 'B.庆大霉素', 'C.甲氧苄啶', 'D.磺胺嘧啶'], correct: 2 },
            { id: 196, chapter: '抗菌药物药理', q: '甲氧苄啶与磺胺甲噁唑合用的目的是 ( )', options: ['A.发挥协同抗菌作用', 'B.促进分布', 'C.抗菌谱相似', 'D.减少过敏反应'], correct: 0 },
            { id: 197, chapter: '抗菌药物药理', q: '关于硝基呋喃类，下列叙述哪项是错误的 ( )', options: ['A.对铜绿假单胞菌无效', 'B.呋喃唑酮仅用于治疗难以根除的幽门螺杆菌感染', 'C.口服吸收好', 'D.细菌对之不易产生耐药性'], correct: 2 },
            { id: 198, chapter: '抗菌药物药理', q: '口服吸收少，仅适用于肠道感染及下尿路感染的是 ( )', options: ['A.甲氧苄啶', 'B.氧氟沙星', 'C.磺胺嘧啶', 'D.呋喃妥因'], correct: 3 },
        ];

        // ============================================================
        //  APP STATE
        // ============================================================
        const state = {
            current: 0,
            answered: new Array(QUESTIONS.length).fill(false),
            selected: new Array(QUESTIONS.length).fill(null), // index of selected option
            wrongIds: new Set(), // store question ids (1-based)
            wrongList: [], // store question objects for wrong book
        };

        // DOM refs
        const $ = id => document.getElementById(id);
        const qNum = $('qNum');
        const qText = $('qText');
        const optionsContainer = $('optionsContainer');
        const feedbackBox = $('feedbackBox');
        const prevBtn = $('prevBtn');
        const nextBtn = $('nextBtn');
        const counterDisplay = $('counterDisplay');
        const progressFill = $('progressFill');
        const progressStats = $('progressStats');
        const chapterTag = $('chapterTag');
        const wrongToggle = $('wrongToggle');
        const wrongPanel = $('wrongPanel');
        const wrongList = $('wrongList');
        const wrongBadge = $('wrongBadge');

        // ============================================================
        //  RENDER
        // ============================================================
        function renderQuestion(index) {
            const q = QUESTIONS[index];
            if (!q) return;

            // Update header
            chapterTag.textContent = q.chapter;
            qNum.textContent = `第 ${q.id} 题`;
            qText.textContent = q.q;

            // Options
            const labels = ['A', 'B', 'C', 'D', 'E'];
            optionsContainer.innerHTML = '';
            const isAnswered = state.answered[index];
            const selectedIdx = state.selected[index];

            q.options.forEach((opt, idx) => {
                const div = document.createElement('div');
                div.className = 'option-item';
                if (isAnswered) div.classList.add('disabled');

                // Mark correct/wrong
                if (isAnswered) {
                    if (idx === q.correct) {
                        div.classList.add('correct');
                    } else if (idx === selectedIdx && idx !== q.correct) {
                        div.classList.add('wrong');
                    }
                }

                const labelSpan = document.createElement('span');
                labelSpan.className = 'label';
                labelSpan.textContent = labels[idx] || '';

                const textSpan = document.createElement('span');
                textSpan.className = 'text';
                textSpan.textContent = opt;

                div.appendChild(labelSpan);
                div.appendChild(textSpan);

                if (!isAnswered) {
                    div.addEventListener('click', () => handleOptionClick(index, idx));
                }

                optionsContainer.appendChild(div);
            });

            // Feedback
            if (isAnswered) {
                const isCorrect = selectedIdx === q.correct;
                feedbackBox.className = `feedback-box show ${isCorrect ? 'correct' : 'wrong'}`;
                feedbackBox.textContent = isCorrect ?
                    '✅ 回答正确！' :
                    `❌ 正确答案是 ${labels[q.correct]}`;
            } else {
                feedbackBox.className = 'feedback-box';
                feedbackBox.textContent = '';
            }

            // Counter
            counterDisplay.textContent = `${index + 1} / ${QUESTIONS.length}`;
            const progress = ((index + 1) / QUESTIONS.length) * 100;
            progressFill.style.width = `${progress}%`;
            progressStats.textContent = `${index + 1} / ${QUESTIONS.length}`;

            // Nav buttons
            prevBtn.disabled = index === 0;
            nextBtn.disabled = index === QUESTIONS.length - 1;

            // Update wrong badge
            updateWrongBadge();
        }

        function handleOptionClick(index, selectedIdx) {
            if (state.answered[index]) return;
            const q = QUESTIONS[index];
            state.answered[index] = true;
            state.selected[index] = selectedIdx;

            const isCorrect = selectedIdx === q.correct;

            // If wrong, add to wrong book (if not already)
            if (!isCorrect) {
                const id = q.id;
                if (!state.wrongIds.has(id)) {
                    state.wrongIds.add(id);
                    state.wrongList.push(q);
                }
            } else {
                // If correct, remove from wrong book if present
                const id = q.id;
                if (state.wrongIds.has(id)) {
                    state.wrongIds.delete(id);
                    state.wrongList = state.wrongList.filter(item => item.id !== id);
                }
            }

            renderQuestion(index);
            renderWrongList();
            updateWrongBadge();
        }

        // ============================================================
        //  NAVIGATION
        // ============================================================
        function goPrev() {
            if (state.current > 0) {
                state.current--;
                renderQuestion(state.current);
            }
        }

        function goNext() {
            if (state.current < QUESTIONS.length - 1) {
                state.current++;
                renderQuestion(state.current);
            }
        }

        // ============================================================
        //  WRONG BOOK
        // ============================================================
        function renderWrongList() {
            if (state.wrongList.length === 0) {
                wrongList.innerHTML = `<div class="empty-msg">✨ 没有错题，继续加油！</div>`;
                return;
            }
            let html = '';
            state.wrongList.forEach(q => {
                html += `
                    <div class="wrong-item" data-id="${q.id}">
                        <span class="q-idx">#${q.id}</span>
                        <span class="q-preview">${q.q.slice(0, 50)}${q.q.length > 50 ? '…' : ''}</span>
                        <button class="remove-btn" data-id="${q.id}" title="从错题本移除">✕</button>
                    </div>
                `;
            });
            wrongList.innerHTML = html;

            // Click to jump
            wrongList.querySelectorAll('.wrong-item').forEach(el => {
                const id = parseInt(el.dataset.id);
                el.addEventListener('click', (e) => {
                    if (e.target.classList.contains('remove-btn')) return;
                    const idx = QUESTIONS.findIndex(q => q.id === id);
                    if (idx !== -1) {
                        state.current = idx;
                        renderQuestion(idx);
                        // close panel on mobile
                        wrongPanel.classList.remove('open');
                    }
                });
            });

            // Remove button
            wrongList.querySelectorAll('.remove-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const id = parseInt(btn.dataset.id);
                    state.wrongIds.delete(id);
                    state.wrongList = state.wrongList.filter(q => q.id !== id);
                    renderWrongList();
                    updateWrongBadge();
                    // re-render current question to update option styles
                    renderQuestion(state.current);
                });
            });
        }

        function updateWrongBadge() {
            const count = state.wrongIds.size;
            wrongBadge.textContent = count;
            wrongBadge.style.display = count > 0 ? 'inline-block' : 'none';
        }

        // ============================================================
        //  TOGGLE WRONG PANEL
        // ============================================================
        wrongToggle.addEventListener('click', () => {
            wrongPanel.classList.toggle('open');
            if (wrongPanel.classList.contains('open')) {
                renderWrongList();
            }
        });

        // ============================================================
        //  KEYBOARD SHORTCUTS
        // ============================================================
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') goPrev();
            if (e.key === 'ArrowRight') goNext();
            // Number keys 1-5 for options
            const num = parseInt(e.key);
            if (num >= 1 && num <= 5) {
                const idx = num - 1;
                const q = QUESTIONS[state.current];
                if (q && q.options && idx < q.options.length && !state.answered[state.current]) {
                    handleOptionClick(state.current, idx);
                }
            }
        });

        // ============================================================
        //  INIT
        // ============================================================
        renderQuestion(0);
        renderWrongList();
        updateWrongBadge();

        // Event listeners
        prevBtn.addEventListener('click', goPrev);
        nextBtn.addEventListener('click', goNext);

        console.log(`✅ 药理题库加载完成，共 ${QUESTIONS.length} 题`);
        console.log('💡 快捷键：← 上一题  → 下一题  1-5 选择选项');
    </script>
